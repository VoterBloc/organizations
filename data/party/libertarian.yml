summary: >
  Founded in 1971, the Libertarian Party advocates minimal government, free
  markets, civil liberties, and non-interventionism, grounded in the consistent
  application of the principle of non-initiation of coercion or fraud. It is the
  third-largest political party in the United States by registration.
mission: >
  As Libertarians, we seek a world of liberty: a world in which all individuals
  are sovereign over their own lives and are not forced to sacrifice their values
  for the benefit of others.
