summary: >
  The Green Party of the United States is a left-wing third party organized as a
  federation of state Green parties. Its values are encoded in the "Four Pillars"
  (Peace and Non-Violence, Ecological Wisdom, Grassroots Democracy, and Social
  Justice) and an extended "Ten Key Values," and the party refuses corporate
  funding.
mission: >
  We don't take corporate money. We are working to build clean government that
  works for all of us – not just the 1%.
