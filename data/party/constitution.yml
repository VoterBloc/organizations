summary: >
  Founded in the early 1990s as the U.S. Taxpayers' Party and renamed Constitution
  Party in 1999, it is a paleoconservative third party promoting an originalist,
  religiously conservative interpretation of the U.S. Constitution. It draws on
  Biblical principles in its platform and represents the Christian right within
  third-party politics.
